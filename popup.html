<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "SF Mono", "Menlo", "Monaco", monospace;
    font-size: 12px;
    background: #1a1a1a;
    color: #e0e0e0;
  }

  .toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #2a2a2a;
    padding: 6px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #444;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
  }

  .toolbar .title { font-weight: 700; }
  .toolbar .stats { color: #aaa; font-size: 12px; }
  .toolbar .stats .crit-count { color: #ff4444; font-weight: 700; }
  .toolbar .stats .warn-count { color: #ffcc00; font-weight: 700; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead { position: sticky; top: 37px; z-index: 5; }

  th {
    background: #333;
    text-align: left;
    padding: 4px 8px;
    font-weight: 700;
    font-size: 11px;
    color: #ccc;
    border-bottom: 2px solid #555;
    white-space: nowrap;
    user-select: none;
  }

  td {
    padding: 3px 8px;
    border-bottom: 1px solid rgba(0,0,0,0.3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 12px;
    line-height: 1.4;
  }

  /* Column widths */
  col.c-host    { width: 100px; }
  col.c-service { width: 80px; }
  col.c-flags   { width: 40px; }
  col.c-state   { width: 80px; }
  col.c-last    { width: 100px; }
  col.c-dur     { width: 100px; }
  col.c-att     { width: 40px; }
  col.c-msg     { width: auto; }

  td:last-child {
    white-space: normal;
    word-break: break-word;
  }

  /* === Nagstamon-style solid row colours === */
  tr.CRITICAL td, tr.DOWN td {
    background: #cc0000;
    color: #fff;
    border-bottom-color: #990000;
  }
  tr.WARNING td {
    background: #ccaa00;
    color: #000;
    border-bottom-color: #aa8800;
  }
  tr.UNKNOWN td, tr.UNREACHABLE td {
    background: #cc6600;
    color: #fff;
    border-bottom-color: #aa5500;
  }
  tr.PENDING td {
    background: #555;
    color: #ccc;
    border-bottom-color: #444;
  }

  /* Downtime rows get muted */
  tr.in-downtime td { opacity: 0.6; }

  tr:hover td { filter: brightness(1.15); }

  .flags { font-size: 11px; letter-spacing: 1px; }

  .ok-message {
    text-align: center;
    padding: 80px 20px;
    color: #4a4;
    font-size: 18px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .ok-message .sub {
    margin-top: 8px;
    font-size: 13px;
    color: #666;
  }
</style>
</head>
<body>
  <div id="app"></div>
  <script>
    function render(problems) {
      const app = document.getElementById("app");

      if (!problems || problems.length === 0) {
        app.innerHTML = '<div class="ok-message">All clear<div class="sub">No problems detected</div></div>';
        return;
      }

      // Counts
      let crits = 0, warns = 0, unknowns = 0;
      for (const p of problems) {
        const s = (p.state || "").toUpperCase();
        if (s === "CRITICAL" || s === "DOWN") crits++;
        else if (s === "WARNING") warns++;
        else if (s === "UNKNOWN" || s === "UNREACHABLE") unknowns++;
      }

      let html = `<div class="toolbar">
        <span class="title">cmkbar</span>
        <span class="stats">
          ${problems.length} problems`;
      if (crits) html += ` &middot; <span class="crit-count">${crits} critical</span>`;
      if (warns) html += ` &middot; <span class="warn-count">${warns} warning</span>`;
      html += `</span></div>`;

      html += `<table>
        <colgroup>
          <col class="c-host"><col class="c-service"><col class="c-flags"><col class="c-state">
          <col class="c-last"><col class="c-dur"><col class="c-att"><col class="c-msg">
        </colgroup>
        <thead><tr>
          <th>Host</th><th>Service</th><th></th><th>State</th>
          <th>Last Check</th><th>Duration</th><th>Att</th><th>Status Information</th>
        </tr></thead><tbody>`;

      // Sort: CRIT/DOWN first, then WARN, then UNKNOWN, then rest
      const order = {"CRITICAL":0,"DOWN":0,"WARNING":1,"UNKNOWN":2,"UNREACHABLE":2,"PENDING":3};
      problems.sort((a, b) => (order[(a.state||"").toUpperCase()] ?? 9) - (order[(b.state||"").toUpperCase()] ?? 9));

      for (const p of problems) {
        const state = (p.state || "").toUpperCase();
        let classes = state;
        if (p.downtime) classes += " in-downtime";

        // Flag icons like Nagstamon: ✓ = ack, ★ = downtime
        let flags = "";
        if (p.acknowledged) flags += "✓";
        if (p.downtime) flags += "★";

        html += `<tr class="${classes}">`;
        html += `<td>${esc(p.host)}</td>`;
        html += `<td>${esc(p.service || "(host)")}</td>`;
        html += `<td class="flags">${flags}</td>`;
        html += `<td>${esc(state)}</td>`;
        html += `<td>${esc(p.last_check)}</td>`;
        html += `<td>${esc(p.duration)}</td>`;
        html += `<td>${esc(p.attempt)}</td>`;
        html += `<td>${esc(p.message)}</td>`;
        html += `</tr>`;
      }

      html += "</tbody></table>";
      app.innerHTML = html;
    }

    function esc(s) {
      if (s == null) return "";
      const d = document.createElement("div");
      d.textContent = String(s);
      return d.innerHTML;
    }

    window.updateProblems = render;
  </script>
</body>
</html>
